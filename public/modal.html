<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Create New Task - Lucid</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "tertiary": "#924700",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#d8e2ff",
                        "on-tertiary-container": "#fffbff",
                        "surface-tint": "#005ac2",
                        "on-tertiary-fixed-variant": "#723600",
                        "secondary-container": "#b6ccff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#001a42",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-variant": "#e1e2e4",
                        "surface-container-low": "#f3f4f6",
                        "on-primary-container": "#fefcff",
                        "on-background": "#191c1e",
                        "tertiary-fixed-dim": "#ffb786",
                        "primary": "#0058be",
                        "secondary": "#495e8a",
                        "on-surface-variant": "#424754",
                        "on-primary-fixed-variant": "#004395",
                        "surface-bright": "#f8f9fb",
                        "outline-variant": "#c2c6d6",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9fb",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#405682",
                        "primary-fixed": "#d8e2ff",
                        "on-surface": "#191c1e",
                        "on-secondary-fixed-variant": "#304671",
                        "inverse-primary": "#adc6ff",
                        "surface-container": "#edeef0",
                        "primary-container": "#2170e4",
                        "surface-container-highest": "#e1e2e4",
                        "error": "#ba1a1a",
                        "background": "#f8f9fb",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "tertiary-container": "#b75b00",
                        "tertiary-fixed": "#ffdcc6",
                        "secondary-fixed-dim": "#b1c6f9",
                        "inverse-on-surface": "#f0f1f3",
                        "surface-container-high": "#e7e8ea",
                        "surface-dim": "#d9dadc",
                        "on-primary-fixed": "#001a42",
                        "outline": "#727785",
                        "on-tertiary-fixed": "#311400"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tonal-shift {
            transition: background-color 0.3s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="bg-surface-container-low text-on-surface min-h-screen flex flex-col">
    <!-- TopNavBar Shell -->
    <header class="bg-white dark:bg-gray-900 w-full sticky top-0 z-50 tonal-shift">
        <div
            class="flex justify-between items-center h-20 px-8 max-w-screen-2xl mx-auto font-manrope antialiased tracking-tight">
            <div class="text-2xl font-black text-gray-900 dark:text-white tracking-tighter">
                Lucid
            </div>
            <nav class="hidden md:flex items-center space-x-8">
                <a class="text-gray-500 dark:text-gray-400 font-medium hover:text-gray-900 dark:hover:text-white transition-colors duration-200 hover:text-blue-600"
                    href="#">My Tasks</a>
                <a class="text-gray-500 dark:text-gray-400 font-medium hover:text-gray-900 dark:hover:text-white transition-colors duration-200 hover:text-blue-600"
                    href="#">Completed</a>
            </nav>
            <div class="flex items-center space-x-6">
                <button
                    class="material-symbols-outlined text-outline cursor-pointer active:scale-95 transition-transform"
                    data-icon="settings">settings</button>
                <button
                    class="material-symbols-outlined text-outline cursor-pointer active:scale-95 transition-transform"
                    data-icon="account_circle">account_circle</button>
                <button
                    class="hidden md:block bg-primary text-on-primary px-6 py-2.5 rounded-lg font-bold hover:bg-primary-container transition-all active:scale-95">
                    Create Task
                </button>
            </div>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center p-6 md:p-12">
        <!-- Create Task Card -->
        <div
            class="w-full max-w-xl bg-surface-container-lowest rounded-xl p-8 md:p-12 shadow-[0px_12px_32px_rgba(25,28,30,0.04)] relative overflow-hidden">
            <!-- Branding Accent -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary to-primary-container"></div>
            <div class="mb-10 text-center">
                <h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Create New Task</h1>
                <p class="text-outline text-sm font-medium uppercase tracking-[0.05em]">New Entry in Digital Workspace
                </p>
            </div>
            <form class="space-y-8">
                <!-- Title Field -->
                <div class="group">
                    <label
                        class="block text-[10px] font-bold tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors"
                        for="title">
                        Task Title
                    </label>
                    <input
                        class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 focus:bg-surface-container-lowest transition-all p-4 rounded-lg text-on-surface placeholder:text-outline/50 font-medium"
                        id="title" placeholder="What needs to be done?" type="text" />
                </div>
                <!-- Description Field -->
                <div class="group">
                    <label
                        class="block text-[10px] font-bold tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors"
                        for="description">
                        Description
                    </label>
                    <textarea
                        class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 focus:bg-surface-container-lowest transition-all p-4 rounded-lg text-on-surface placeholder:text-outline/50 font-medium resize-none"
                        id="description" placeholder="Add context or sub-tasks..." rows="4"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Due Date Field -->
                    <div class="group">
                        <label
                            class="block text-[10px] font-bold tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors"
                            for="due-date">
                            Due Date
                        </label>
                        <div class="relative">
                            <input
                                class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 focus:bg-surface-container-lowest transition-all p-4 rounded-lg text-on-surface font-medium appearance-none"
                                id="due-date" type="date" />
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none"
                                data-icon="calendar_today">calendar_today</span>
                        </div>
                    </div>
                    <!-- Priority Field -->
                    <div class="group">
                        <label
                            class="block text-[10px] font-bold tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors"
                            for="priority">
                            Priority
                        </label>
                        <div class="relative">
                            <select
                                class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 focus:bg-surface-container-lowest transition-all p-4 rounded-lg text-on-surface font-medium appearance-none"
                                id="priority">
                                <option value="low">Low</option>
                                <option selected="" value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none"
                                data-icon="expand_more">expand_more</span>
                        </div>
                    </div>
                </div>
                <!-- Actions -->
                <div class="pt-6 flex flex-col md:flex-row items-center gap-4">
                    <button
                        class="w-full md:flex-1 bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                        type="submit">
                        <span class="material-symbols-outlined" data-icon="check_circle"
                            style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Save Task
                    </button>
                    <button
                        class="w-full md:w-auto px-8 py-4 text-outline font-semibold hover:text-on-surface transition-colors flex items-center justify-center gap-2"
                        type="button">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </main>
    <!-- SideNavBar Simulation for Layout Context (Mobile Suppression) -->
    <div class="hidden lg:block">
        <!-- Since it's a "centered card" task, we suppress the SideNav to focus the UI, but keeping the TopNav for global navigation -->
    </div>
    <!-- Decorative Element -->
    <div class="fixed bottom-0 left-0 w-full p-8 pointer-events-none flex justify-between items-end opacity-20">
        <div class="text-xs font-bold tracking-widest uppercase text-outline">Project: Productivity Core</div>
        <div class="text-xs font-bold tracking-widest uppercase text-outline">V1.0.4 - Premium Edition</div>
    </div>
</body>

</html>
